<div class="layout">
  <header class="layout__header">
    <div class="brand">
      <div class="brand__icon">
        <span class="material-symbols-outlined">bakery_dining</span>
      </div>
      <div>
        <h1>Eben Ezer</h1>
        <p>Control de inventario y producción</p>
      </div>
    </div>
    <div class="layout__user" *ngIf="userState$ | async as userState">
      @if (userState.user) {
        <span class="user-info">
          <span class="material-symbols-outlined">person</span>
          <span>{{ userState.user.name }}</span>
          @if (userState.user.branchName) {
            <span class="branch-badge">{{ userState.user.branchName }}</span>
          }
        </span>
      }
    </div>
    <div class="layout__today" aria-label="Fecha actual">
      <span class="material-symbols-outlined" aria-hidden="true">calendar_month</span>
      <span>{{ todayLabel }}</span>
    </div>
    <button type="button" class="logout" (click)="logout()">
      <span class="material-symbols-outlined">logout</span>
      <span>Cerrar sesión</span>
    </button>
  </header>

  <nav class="layout__nav">
    <a
      *ngFor="let link of navLinks"
      [routerLink]="link.path"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }"
    >
      <span class="material-symbols-outlined">{{ link.icon }}</span>
      <span>{{ link.label }}</span>
    </a>
  </nav>

  <!-- Mobile bottom bar -->
  <nav class="layout__mobile-bar">
    <a
      *ngFor="let link of navLinks"
      [routerLink]="link.path"
      routerLinkActive="mobile-active"
      [routerLinkActiveOptions]="{ exact: true }"
    >
      <span class="material-symbols-outlined">{{ link.icon }}</span>
      <span>{{ link.label }}</span>
    </a>
  </nav>

  <main class="layout__content">
    <router-outlet></router-outlet>
  </main>
</div>
